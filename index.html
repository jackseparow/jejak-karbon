<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Si Yo: Tabungan Karbon Taman Numerasi</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f7f4; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* --- 1. Title Area (Tempat Maskot & Judul) --- */
        #title-container { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            margin-bottom: 20px; 
            background: white; 
            padding: 15px 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            width: 100%;
            max-width: 1240px;
        }
        .maskot { height: 110px; width: auto; }
        #title-text-area { display: flex; flex-direction: column; text-align: left; }
        h2 { color: #2c3e50; margin: 0; font-size: 1.8em; }
        .sub-h2 { color: #27ae60; margin-top: 5px; margin-bottom: 0; font-weight: bold; }

        /* --- 2. Main Content Layout --- */
        #main-container { display: flex; gap: 20px; width: 100%; max-width: 1300px; margin-top: 10px; }
        #blocklyDiv { height: 680px; flex: 2; border: 3px solid #27ae60; border-radius: 12px; background: white; }
        #sidebar { flex: 1; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border-top: 8px solid #27ae60; display: flex; flex-direction: column; }
        
        /* Dashboard Styling */
        .monitor { margin-bottom: 15px; padding: 15px; border-radius: 10px; border: 2px solid #eee; }
        .debt-box { border-color: #e74c3c; background: #fff5f5; }
        .pay-box { border-color: #2ecc71; background: #f0fff4; }
        .total-box { border-color: #3498db; background: #ebf8ff; font-size: 1.3em; font-weight: bold; }
        
        .val { font-size: 1.5em; display: block; margin-top: 5px; }
        button { background: #34495e; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: auto; }
        button:hover { background: #2c3e50; }
    </style>
</head>
<body>

    <div id="title-container">
        <img src="maskot-siyo.png" alt="Si Yo" class="maskot">
        <div id="title-text-area">
            <h2>🛡️ Si Yo: Tabungan Karbon Kita</h2>
            <p class="sub-h2">Taman Numerasi BBGTK D.I. Yogyakarta</p>
        </div>
    </div>

    <div id="main-container">
        <div id="blocklyDiv"></div>

        <div id="sidebar">
            <div class="monitor debt-box">
                <small>💨 TOTAL PENGELUARAN (EMISI)</small>
                <b id="debt-out" class="val" style="color: #c53030;">0 kg CO2</b>
            </div>
            
            <div class="monitor pay-box">
                <small>🌳 TOTAL TABUNGAN (POHON)</small>
                <b id="pay-out" class="val" style="color: #2f855a;">0 kg CO2</b>
            </div>

            <div class="monitor total-box" id="balance-style">
                <small>⚖️ SALDO KARBON SI YO</small>
                <b id="balance-out" class="val">0 kg CO2</b>
                <span id="status-txt" style="font-size: 0.6em; display: block; margin-top: 5px;">SALDO SEIMBANG</span>
            </div>

            <button onclick="workspace.clear(); updateUI();">Mulai Ulang</button>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="1. Pengeluaran (Emisi)" colour="0">
            <block type="transport_item"></block>
            <block type="debt_container"></block>
        </category>
        <category name="2. Tabungan (Tanam)" colour="120">
            <block type="tree_item"></block>
            <block type="pay_container"></block>
        </category>
        <category name="3. Cek Saldo" colour="210">
            <block type="carbon_balance_nested"></block>
        </category>
    </xml>

    <script>
        // --- 1. DEFINISI BLOK ---
        Blockly.defineBlocksWithJsonArray([
          {
            "type": "transport_item",
            "message0": "%1 Jarak: %2 km",
            "args0": [
              { "type": "field_dropdown", "name": "MODE", "options": [["✈️ Pesawat", "0.25"], ["🚗 Mobil", "0.18"], ["🚆 Kereta", "0.04"], ["🔌 Mobil Listrik", "0.05"]] },
              { "type": "field_number", "name": "DIST", "value": 100 }
            ],
            "previousStatement": null, "nextStatement": null, "colour": 0
          },
          {
            "type": "debt_container",
            "message0": "Daftar Pengeluaran Emisi: %1 %2",
            "args0": [{ "type": "input_dummy" }, { "type": "input_statement", "name": "ITEMS" }],
            "output": "DebtData", "colour": 0
          },
          {
            "type": "tree_item",
            "message0": "Tanam %1 Luas: %2 Ha",
            "args0": [
              { "type": "field_dropdown", "name": "TREE", "options": [["🌳 Munggur", "28000"], ["🌽 Jagung", "4000"], ["🌴 Bakau", "25000"], ["🫚 Kunyit", "2000"]] },
              { "type": "field_number", "name": "AREA", "value": 1 }
            ],
            "previousStatement": null, "nextStatement": null, "colour": 120
          },
          {
            "type": "pay_container",
            "message0": "Buku Tabungan Pohon: %1 %2",
            "args0": [{ "type": "input_dummy" }, { "type": "input_statement", "name": "ITEMS" }],
            "output": "PayData", "colour": 120
          },
          {
            "type": "carbon_balance_nested",
            "message0": "Cek Saldo Si Yo %1 Pengeluaran: %2 %3 Tabungan: %4",
            "args0": [
              { "type": "input_dummy" },
              { "type": "input_value", "name": "DEBT", "check": "DebtData" },
              { "type": "input_dummy" },
              { "type": "input_value", "name": "PAY", "check": "PayData" }
            ],
            "colour": 210
          }
        ]);

        const workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox'), trashcan: true });

        function solveDebt(block) {
            let total = 0;
            let item = block.getInputTargetBlock('ITEMS');
            while (item) {
                total += (parseFloat(item.getFieldValue('MODE')) * parseFloat(item.getFieldValue('DIST')));
                item = item.getNextBlock();
            }
            return total;
        }

        function solvePay(block) {
            let total = 0;
            let item = block.getInputTargetBlock('ITEMS');
            while (item) {
                total += (parseFloat(item.getFieldValue('TREE')) * parseFloat(item.getFieldValue('AREA')) / 365);
                item = item.getNextBlock();
            }
            return total;
        }

        function updateUI() {
            let finalDebt = 0;
            let finalPay = 0;

            workspace.getAllBlocks(false).forEach(block => {
                if (!block.getParent()) {
                    if (block.type === 'debt_container') finalDebt = solveDebt(block);
                    if (block.type === 'pay_container') finalPay = solvePay(block);
                    if (block.type === 'carbon_balance_nested') {
                        const d = block.getInputTargetBlock('DEBT');
                        const p = block.getInputTargetBlock('PAY');
                        if (d) finalDebt = solveDebt(d);
                        if (p) finalPay = solvePay(p);
                    }
                }
            });

            document.getElementById('debt-out').innerText = finalDebt.toFixed(2) + " kg CO2";
            document.getElementById('pay-out').innerText = finalPay.toFixed(2) + " kg CO2";
            
            const balance = finalPay - finalDebt;
            const balOut = document.getElementById('balance-out');
            const style = document.getElementById('balance-style');
            const status = document.getElementById('status-txt');

            balOut.innerText = Math.abs(balance).toFixed(2) + " kg CO2";
            
            if (balance < -0.1) {
                style.style.borderColor = "#e74c3c";
                status.innerText = "SALDO MINUS (BOROS EMISI) 📉";
                balOut.style.color = "#c53030";
            } else if (balance > 0.1) {
                style.style.borderColor = "#2ecc71";
                status.innerText = "SALDO POSITIF (PAHLAWAN BUMI) 🌳";
                balOut.style.color = "#2f855a";
            } else {
                style.style.borderColor = "#3498db";
                status.innerText = "SALDO SEIMBANG";
                balOut.style.color = "#2c3e50";
            }
        }

        workspace.addChangeListener(updateUI);
    </script>
</body>
</html>
