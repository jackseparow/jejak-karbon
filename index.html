<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Si Yo: Kalkulator Hutang Karbon</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #main-container { display: flex; gap: 20px; width: 100%; max-width: 1400px; margin-top: 10px; }
        
        /* Area Kerja */
        #blocklyDiv { height: 650px; flex: 2; border: 3px solid #2ecc71; border-radius: 12px; background: white; }
        
        /* Dashboard Hutang Karbon */
        #sidebar { flex: 1.2; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border-top: 8px solid #e74c3c; }
        
        .stat-card { background: #fff5f5; border: 2px solid #feb2b2; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .stat-card.green { background: #f0fff4; border-color: #9ae6b4; }
        
        #balance-box { font-size: 1.5em; font-weight: bold; padding: 20px; border-radius: 12px; margin-top: 15px; transition: 0.5s; }
        .debt { background: #fff5f5; color: #c53030; border: 2px solid #fc8181; }
        .paid { background: #f0fff4; color: #2f855a; border: 2px solid #68d391; }

        .visual-area { width: 100%; height: 200px; background: #edf2f7; border-radius: 12px; position: relative; margin-top: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        
        button { background: #4a5568; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h2>🛡️ Si Yo: Penjaga Jejak Karbon</h2>
    <p>Hitung emisi perjalananmu dan lunasinya dengan menanam pohon!</p>

    <div id="main-container">
        <div id="blocklyDiv"></div>

        <div id="sidebar">
            <div class="stat-card">
                <small>💨 Total Emisi (Hutang)</small>
                <div id="debt-val" style="font-size: 1.8em; font-weight: bold; color: #e53e3e;">0 kg CO2</div>
            </div>
            
            <div class="stat-card green">
                <small>🌳 Penyerapan (Pelunasan)</small>
                <div id="pay-val" style="font-size: 1.8em; font-weight: bold; color: #38a169;">0 kg CO2</div>
            </div>

            <div id="balance-box" class="debt">
                NERACA: <br> <span id="balance-val">0 kg CO2</span>
                <div id="status-text" style="font-size: 0.5em; margin-top: 5px;">HUTANG PADA BUMI</div>
            </div>

            <div class="visual-area" id="visual-icon">🌍</div>
            
            <button onclick="resetApp()">Mulai Perjalanan Baru</button>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="1. Perjalanan" colour="0">
            <block type="transport_trip"></block>
        </category>
        <category name="2. Penanaman" colour="120">
            <block type="planting_action"></block>
        </category>
        <category name="3. Kalkulator" colour="210">
            <block type="carbon_balance"></block>
        </category>
    </xml>

    <script>
        // --- 1. DEFINISI BLOK ---
        Blockly.defineBlocksWithJsonArray([
          {
            "type": "transport_trip",
            "message0": "Perjalanan: %1 Jarak: %2 km",
            "args0": [
              {
                "type": "field_dropdown", "name": "VEHICLE",
                "options": [
                  ["✈️ Pesawat Terbang", "0.25"],
                  ["🚗 Mobil Pribadi", "0.18"],
                  ["🚆 Kereta Api", "0.04"],
                  ["🔌 Mobil Listrik", "0.05"],
                  ["🚌 Bus Umum", "0.08"]
                ]
              },
              { "type": "field_number", "name": "DIST", "value": 100, "min": 0 }
            ],
            "output": "Emission", "colour": 0
          },
          {
            "type": "planting_action",
            "message0": "Tanam %1 Luas: %2 Hektar",
            "args0": [
              {
                "type": "field_dropdown", "name": "TREE",
                "options": [
                  ["🌳 Pohon Munggur (Trembesi)", "28000"], // per hektar/tahun (est)
                  ["🌽 Jagung", "4000"],
                  ["🌲 Pinus", "12000"],
                  ["🌴 Bakau (Mangrove)", "25000"]
                ]
              },
              { "type": "field_number", "name": "AREA", "value": 1, "min": 0 }
            ],
            "output": "Sequestration", "colour": 120
          },
          {
            "type": "carbon_balance",
            "message0": "Kalkulator Karbon %1 Emisi: %2 %3 Penyerapan: %4",
            "args0": [
              { "type": "input_dummy" },
              { "type": "input_value", "name": "EMISSION", "check": "Emission" },
              { "type": "input_dummy" },
              { "type": "input_value", "name": "FIX", "check": "Sequestration" }
            ],
            "colour": 210
          }
        ]);

        const workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox'), trashcan: true });

        // --- 2. LOGIKA NUMERASI KARBON ---
        function calculateCarbon(block) {
            if (!block) return null;
            
            if (block.type === 'carbon_balance') {
                const eBlock = block.getInputTargetBlock('EMISSION');
                const fBlock = block.getInputTargetBlock('FIX');
                
                let totalDebt = 0;
                let totalPay = 0;

                if (eBlock) {
                    const factor = parseFloat(eBlock.getFieldValue('VEHICLE'));
                    const dist = parseFloat(eBlock.getFieldValue('DIST'));
                    totalDebt = factor * dist;
                }

                if (fBlock) {
                    const absorption = parseFloat(fBlock.getFieldValue('TREE'));
                    const area = parseFloat(fBlock.getFieldValue('AREA'));
                    // Karena perjalanan itu sekali pakai, sedangkan pohon itu tahunan, 
                    // kita asumsikan ini serapan pohon per hari agar skalanya masuk akal.
                    totalPay = (absorption * area) / 365; 
                }

                return { debt: totalDebt, pay: totalPay };
            }
            return null;
        }

        function updateUI(data) {
            const debtEl = document.getElementById('debt-val');
            const payEl = document.getElementById('pay-val');
            const balEl = document.getElementById('balance-val');
            const box = document.getElementById('balance-box');
            const status = document.getElementById('status-text');
            const icon = document.getElementById('visual-icon');

            const debt = data ? data.debt : 0;
            const pay = data ? data.pay : 0;
            const balance = pay - debt;

            debtEl.innerText = debt.toFixed(2) + " kg CO2";
            payEl.innerText = pay.toFixed(2) + " kg CO2";
            balEl.innerText = Math.abs(balance).toFixed(2) + " kg CO2";

            if (balance < 0) {
                box.className = "debt";
                status.innerText = "HUTANG PADA BUMI 📉";
                icon.innerText = "🌫️";
            } else if (balance > 0) {
                box.className = "paid";
                status.innerText = "LUNAS & HIJAU! 🌳";
                icon.innerText = "🍃";
            } else {
                box.className = "";
                status.innerText = "MULAI HITUNG";
                icon.innerText = "🌍";
            }
        }

        workspace.addChangeListener(() => {
            const blocks = workspace.getAllBlocks(false);
            let data = null;
            blocks.forEach(b => {
                if (b.type === 'carbon_balance') data = calculateCarbon(b);
            });
            updateUI(data);
        });

        function resetApp() { workspace.clear(); updateUI(null); }
    </script>
</body>
</html>
